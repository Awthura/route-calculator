name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets
        run: |
          find . -name "*.html" \
            -not -path "./.git/*" \
            -exec sed -i "s|__MAPS_API_KEY__|${{ secrets.MAPS_API_KEY }}|g" {} + && \
          find . -name "*.html" \
            -not -path "./.git/*" \
            -exec sed -i "s|__WEBHOOK_URL__|${{ secrets.WEBHOOK_URL }}|g" {} + && \
          find . -name "*.html" \
            -not -path "./.git/*" \
            -exec sed -i "s|__WEBHOOK_URL_MULTI__|${{ secrets.WEBHOOK_URL_MULTI }}|g" {} + && \
          find . -name "auth.js" \
            -exec sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" {} + && \
          find . -name "auth.js" \
            -exec sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
